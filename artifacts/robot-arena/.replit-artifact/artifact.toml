kind = "web"
previewPath = "/"
title = "Robot Arena"
version = "1.0.0"
id = "artifacts/robot-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23186

[services.development]
run = "pnpm --filter @workspace/robot-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/robot-arena", "run", "build" ]
publicDir = "artifacts/robot-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23186"
BASE_PATH = "/"
